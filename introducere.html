<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Introducere</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff0f7;
        }

        .image-container {
            position: relative;
            width: 100%;
            max-width: 1218px;
            margin: 0 auto;
        }

            .image-container img {
                display: block;
                width: 100%;
                height: auto;
            }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .button-wrapper {
            background-color: rgba(255, 66, 208, 0.863);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
        }

        .shifting-button {
            text-align: center;
            font-family: "Dancing Script", cursive;
            font-size: 40px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.932);
            background-color: rgba(248, 104, 176, 0.788);
            display: inline-block;
            text-decoration: none;
            border: none;
            transition: 0.2s;
        }

            .shifting-button:hover {
                background-color: rgba(212, 65, 134, 0.829);
            }

            .shifting-button:active {
                opacity: 0.7;
            }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="thumbnailss/ffe.gif" alt="Introducere">
        <div class="overlay-text">
            <div class="button-wrapper">
                <a href="shiftingul.html" class="shifting-button">Shifting</a>
            </div>
        </div>
    </div>

</body>
</html>
